name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  baseline:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package and development tools
        run: python -m pip install ".[dev]"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Lint
        run: ruff check src tests scripts/renewable_huber
      - name: Build distributions
        run: python -m build

  optional-backend:
    name: ${{ matrix.name }} CPU
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: PyTorch
            extra: gpu-torch
            test-module: tests.test_torch_backend
          - name: TensorFlow
            extra: gpu-tensorflow
            test-module: tests.test_tensorflow_backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package and ${{ matrix.name }}
        run: python -m pip install ".[dev,${{ matrix.extra }}]"
      - name: Run ${{ matrix.name }} backend tests
        env:
          TF_CPP_MIN_LOG_LEVEL: "2"
        run: python -m unittest ${{ matrix.test-module }} -v
